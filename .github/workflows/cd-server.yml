# server (Ktor) を Cloud Run にデプロイする。
#
# 必要な Secrets:
#   - GCP_WORKLOAD_IDENTITY_PROVIDER: Workload Identity Federation のプロバイダ ID
#   - GCP_SERVICE_ACCOUNT: デプロイに使う Google Cloud サービスアカウントのメールアドレス
#
# 必要な Variables:
#   - GCP_PROJECT_ID: デプロイ先の Google Cloud プロジェクト ID
#   - GCP_REGION: デプロイ先リージョン（例: asia-northeast1）
#   - GAR_REPOSITORY: イメージを push する Artifact Registry のリポジトリ名
#   - GCP_RUNTIME_SERVICE_ACCOUNT: Cloud Run サービス自体に紐付ける実行時サービスアカウントのメールアドレス
#
# GCP_SERVICE_ACCOUNT に必要な IAM ロール:
#   - roles/artifactregistry.writer（プロジェクト）: イメージ push
#   - roles/run.admin（プロジェクト）: Cloud Run デプロイ。--allow-unauthenticated の IAM 設定に
#     run.services.setIamPolicy が要るため run.developer では不足
#   - roles/iam.serviceAccountUser（GCP_RUNTIME_SERVICE_ACCOUNT 上）: 実行時 SA の紐付けに必要
name: CD Server

on:
  push:
    branches:
      - main
    # ルートの build.gradle.kts は kotlinJvm/ktor プラグインの apply false 宣言を持ち、
    # server のビルドに影響するため対象に含める。
    paths:
      - 'server/**'
      - 'shared/**'
      - 'build.gradle.kts'
      - 'gradle/**'
      - 'gradlew'
      - 'gradle.properties'
      - 'settings.gradle.kts'
      - 'build-logic/**'
      - '.github/workflows/cd-server.yml'

permissions:
  contents: read
  id-token: write # Workload Identity Federation での Google Cloud 認証に必要

concurrency:
  group: cloud-run
  cancel-in-progress: false

jobs:
  changes:
    uses: ./.github/workflows/detect-docs-only.yml
    permissions:
      issues: read
      pull-requests: read

  build:
    needs: changes
    # changes ジョブ自体が失敗/タイムアウトした場合も outputs.code は空文字になり fail open すべきなので、
    # true との一致ではなく false との不一致で判定する(== 'true' だと changes 失敗時にサイレントスキップしてしまう)。
    if: needs.changes.outputs.code != 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # IMAGE は github.sha から決定的に求まるため、job 間で output 経由に渡さず build/deploy それぞれで再計算する。
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/kei-1111-server:${{ github.sha }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'

      # Gradle User Home のキャッシュ保存・復元（main への push なので書き込みが有効になる）。
      # v6 は構成キャッシュ未対応のため cache-encryption-key は将来の対応復活時に有効になる。
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Build fat jar
        run: ./gradlew :server:buildFatJar

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t "$IMAGE" server
          docker push "$IMAGE"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}/kei-1111-server:${{ github.sha }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: kei-1111-server
          region: ${{ vars.GCP_REGION }}
          image: ${{ env.IMAGE }}
          flags: >-
            --allow-unauthenticated
            --min-instances=0
            --max-instances=1
            --memory=512Mi
            --port=8080
            --service-account=${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}
            --set-secrets=GITHUB_TOKEN=github-token:1
          # --set-secrets のバージョン固定（:1）: latest 固定は Google 非推奨。PAT ローテ時は新 version 登録後にここを更新して再デプロイする。
