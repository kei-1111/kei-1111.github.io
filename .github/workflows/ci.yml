name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ai-docs の symlink / SKILL.md frontmatter / wrapper 参照の整合性チェック（JDK 不要）
  ai-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Check ai-docs structure
        run: ./scripts/check_ai_docs.sh

  detekt:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'

      # Gradle User Home のキャッシュ復元（PR では read-only、書き込みは main の CD 実行時のみ）。
      # v6 は構成キャッシュ未対応のため cache-encryption-key は将来の対応復活時に有効になる。
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      # detekt は type resolution なしでコンパイルを伴わないため、
      # wasm と preview 用 Android target のコンパイル検証を同居させる
      - name: Run detekt and compile checks
        run: ./gradlew detekt :composeApp:compileKotlinWasmJs compileAndroidMain
