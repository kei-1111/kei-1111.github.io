name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  detekt:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'

      # Gradle User Home のキャッシュ復元（PR では read-only、書き込みは main の CD 実行時のみ）
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      # detekt は type resolution なしでコンパイルを伴わないため、
      # wasm と preview 用 Android target のコンパイル検証を同居させる
      - name: Run detekt and compile checks
        run: ./gradlew detekt :composeApp:compileKotlinWasmJs compileAndroidMain
