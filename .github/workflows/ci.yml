name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  detekt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      # Gradle User Home のキャッシュ復元（PR では read-only、書き込みは main の CD 実行時のみ）
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run detekt
        run: ./gradlew detekt
