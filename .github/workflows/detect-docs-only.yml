name: Detect Docs-Only Change

on:
  workflow_call:
    outputs:
      code:
        description: "false のときのみドキュメントのみの変更。true は実コード変更・判定不能によるフォールバックの両方を含む"
        value: ${{ jobs.detect.outputs.code }}

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Check linked Issue type
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          PR_BODY: ${{ github.event.pull_request.body }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -uo pipefail

          body="$PR_BODY"

          # CD は push イベント(マージ後)で走るため PR body を直接取れない。
          # デフォルトの "Merge pull request #N from ..." というマージコミットメッセージから
          # PR 番号を復元し、gh pr view で body を取得し直す。
          if [ "$EVENT_NAME" != "pull_request" ]; then
            pr_number=$(printf '%s' "$COMMIT_MESSAGE" | grep -oE 'Merge pull request #[0-9]+' | grep -oE '[0-9]+' | head -n1 || true)
            if [ -z "${pr_number:-}" ]; then
              echo "code=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            body=$(gh pr view "$pr_number" --repo "$REPO" --json body -q '.body // empty' 2>/dev/null || true)
          fi

          # Issue 参照が取れない・API が失敗する等、判定できないケースは常に fail open
          # (code=true = 通常実行)とし、不確実な状況でサイレントにスキップしない。
          # 複数の "Closes #N" がある場合は、そのすべてが [Documentation]: 起点でない限り docs-only とみなさない。
          issue_numbers=$(printf '%s' "$body" | grep -oiE 'closes #[0-9]+' | grep -oE '[0-9]+' | sort -u || true)
          if [ -z "${issue_numbers:-}" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          code=true
          for issue_number in $issue_numbers; do
            issue_title=$(gh issue view "$issue_number" --repo "$REPO" --json title -q '.title // empty' 2>/dev/null || true)
            if [ -z "${issue_title:-}" ]; then
              code=true
              break
            fi
            if [[ "$issue_title" == "[Documentation]:"* ]]; then
              code=false
            else
              code=true
              break
            fi
          done

          echo "code=$code" >> "$GITHUB_OUTPUT"
