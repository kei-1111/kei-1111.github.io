name: CD

# push トリガーなのは GitHub Actions のキャッシュスコープ対策:
# pull_request イベントで保存したキャッシュは当該 PR からしか参照できないため、
# main への push で保存してブランチ間で共有できるようにする（マージ時の発火タイミングは従来と同じ）
on:
  push:
    branches:
      - main
    # server 単体の変更では Pages 再デプロイ不要（cd-server.yml 側で処理する）。
    # shared/** は wasm 側にもコンパイルされる共有コードのため、ここには入れない。
    paths-ignore:
      - 'server/**'
      - '.github/workflows/cd-server.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      # Pages source が「GitHub Actions」（build_type=workflow、2026-07-11 に API で切替済み）であることが前提。
      # branch 方式だと fail するため、wasm ビルドの前に検出できるよう checkout 直後に置く。
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'

      # Gradle User Home のキャッシュ保存・復元（main への push なので書き込みが有効になる）。
      # v6 は構成キャッシュ未対応のため cache-encryption-key は将来の対応復活時に有効になる。
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Build JS bundle
        run: ./gradlew :app:composeApp:wasmJsBrowserDistribution

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: app/composeApp/build/dist/wasmJs/productionExecutable

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
