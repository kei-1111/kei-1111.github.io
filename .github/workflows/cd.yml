name: CD

# push トリガーなのは GitHub Actions のキャッシュスコープ対策:
# pull_request イベントで保存したキャッシュは当該 PR からしか参照できないため、
# main への push で保存してブランチ間で共有できるようにする（マージ時の発火タイミングは従来と同じ）
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      # Gradle User Home のキャッシュ保存・復元（main への push なので書き込みが有効になる）
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build JS bundle
        run: ./gradlew wasmJsBrowserDistribution

      - name: Deploy 🚀 to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: github-pages
          folder: composeApp/build/dist/wasmJs/productionExecutable
          clean: true
